services:
  imap-smtp-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - ./env.example
    ports:
      - "127.0.0.1:8000:8000"
    read_only: true
    tmpfs:
      - /tmp
    volumes:
      - type: bind
        source: ./runtime/data
        target: /var/lib/imap-smtp-mcp
      - type: bind
        source: ./runtime/audit
        target: /var/lib/imap-smtp-mcp/audit
      - type: bind
        source: ./runtime/ca
        target: /run/secrets
        read_only: true
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD", "python", "-c", "import json,os,ssl,urllib.request; port=os.getenv('MCP_PORT','8000'); https=os.getenv('MCP_INTERNAL_HTTPS','').lower() in {'1','true','yes','on'}; url=f\"{'https' if https else 'http'}://127.0.0.1:{port}/readyz\"; ctx=ssl._create_unverified_context() if https else None; json.load(urllib.request.urlopen(url, timeout=3, context=ctx))['ready']"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
